<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>펫 마스터 - 시가 에디션</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #161616;
            --accent-gold: linear-gradient(135deg, #ffd447 0%, #ff9500 100%);
            --text-main: #e0e0e0;
            --text-dim: #999999;
            --border-color: #222222;
            --table-header: #1a1a1a;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 10px; font-size: 14px;
        }

        .container { max-width: 100%; margin: auto; }
        .section {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 20px; margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.1em; font-weight: bold; margin-bottom: 15px;
            color: #ffd447; display: flex; align-items: center; gap: 8px;
        }

        .input-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 15px; }
        input {
            background: #000; border: 1px solid var(--border-color);
            color: #fff; padding: 10px; border-radius: 8px; outline: none;
        }
        input:focus { border-color: #ffd447; }

        .table-container { 
            overflow-x: auto; border-radius: 10px; 
            border: 1px solid var(--border-color); background: #000;
        }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { 
            background: var(--table-header); color: #ffd447; 
            padding: 12px; border-bottom: 2px solid var(--border-color);
        }
        td { padding: 12px; text-align: center; border-bottom: 1px solid var(--border-color); }

        .badge { padding: 3px 8px; border-radius: 4px; color: white; font-weight: bold; font-size: 11px; display: inline-block; }
        .지 { background-color: #2ecc71; } .수 { background-color: #3498db; }
        .풍 { background-color: #f1c40f; color: #000; } .화 { background-color: #e74c3c; }

        .total-col { color: #ffd447; font-weight: bold; background: rgba(255, 212, 71, 0.05); }
        #loading { color: #ffd447; text-align: center; padding: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading">✨ 부족 데이터 동기화 중...</div>

    <div class="section">
        <div class="section-title">⚖️ 성장률 집중 비교</div>
        <div class="input-row">
            <input type="text" class="comp-name" placeholder="펫 이름 1" onkeyup="if(window.event.keyCode==13){comparePets()}">
            <input type="text" class="comp-name" placeholder="펫 이름 2" onkeyup="if(window.event.keyCode==13){comparePets()}">
            <input type="text" class="comp-name" placeholder="펫 이름 3" onkeyup="if(window.event.keyCode==13){comparePets()}">
            <button onclick="comparePets()" style="background:var(--accent-gold); border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">비교하기</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>이름</th><th>속성</th><th>성장 체력</th><th>성장 공격</th><th>성장 방어</th><th>성장 순발</th>
                        <th style="color:#ff9500">합계(공방순)</th>
                    </tr>
                </thead>
                <tbody id="compareBody"></tbody>
            </table>
        </div>
    </div>

    <div class="section">
        <div class="section-title">🔍 전체 펫 목록 (성장률 기준)</div>
        <div class="table-container" style="max-height: 500px;">
            <table>
                <thead>
                    <tr>
                        <th>#</th><th>이름</th><th>속성1</th><th>속성2</th>
                        <th>성장 체</th><th>성장 공</th><th>성장 방</th><th>성장 순</th>
                    </tr>
                </thead>
                <tbody id="mainBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const JSON_URL = 'https://raw.githubusercontent.com/storazi/cigar/main/petdata.json';
    let allData = [];

    async function loadData() {
        try {
            const response = await fetch(JSON_URL);
            allData = await response.json();
            document.getElementById('loading').style.display = 'none';
            renderMainTable(allData);
        } catch (e) {
            document.getElementById('loading').innerText = '❌ 로드 실패';
        }
    }

    // 배열 내 1번 인덱스(성장률)를 가져오는 함수
    function getGrowth(val) {
        return Array.isArray(val) ? val[1] : val;
    }

    function renderMainTable(data) {
        const tbody = document.getElementById('mainBody');
        tbody.innerHTML = data.map(item => `
            <tr>
                <td style="color:var(--text-dim)">${item.번호}</td>
                <td><strong>${item.이름}</strong></td>
                <td><span class="badge ${item.속성1[0]}">${item.속성1}</span></td>
                <td>${item.속성2 ? `<span class="badge ${item.속성2[0]}">${item.속성2}</span>` : '-'}</td>
                <td>${getGrowth(item.체력)}</td>
                <td style="color:#ff9500; font-weight:bold;">${getGrowth(item.공격력)}</td>
                <td>${getGrowth(item.방어력)}</td>
                <td>${getGrowth(item.순발력)}</td>
            </tr>`).join('');
    }

    function comparePets() {
        const inputs = document.querySelectorAll('.comp-name');
        const names = Array.from(inputs).map(i => i.value.trim()).filter(v => v !== "");
        const rows = allData.filter(item => names.includes(item.이름));
        const tbody = document.getElementById('compareBody');
        
        if (rows.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="color:var(--text-dim)">데이터가 없습니다.</td></tr>';
            return;
        }

        tbody.innerHTML = rows.map(item => {
            const atk = parseFloat(getGrowth(item.공격력)) || 0;
            const def = parseFloat(getGrowth(item.방어력)) || 0;
            const spd = parseFloat(getGrowth(item.순발력)) || 0;
            const total = (atk + def + spd).toFixed(3);
            
            return `
                <tr>
                    <td><strong>${item.이름}</strong></td>
                    <td><span class="badge ${item.속성1[0]}">${item.속성1}</span></td>
                    <td>${getGrowth(item.체력)}</td>
                    <td>${atk}</td>
                    <td>${def}</td>
                    <td>${spd}</td>
                    <td class="total-col">${total}</td>
                </tr>`;
        }).join('');
    }

    loadData();
</script>
</body>
</html>
