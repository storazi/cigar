<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비흡연자의 쉬는시간 - Ultra Renju AI</title>
    <style>
        /* 🎨 Cigar Style Dark Theme */
        :root {
            --bg-main: #0a0a0a;
            --bg-panel: #161616;
            --board-color: #111111;
            --line-color: #332b1a;
            --accent-gold: linear-gradient(135deg, #ffd447 0%, #ff9500 100%);
            --text-gold: #ffd447;
            --text-main: #e0e0e0;
            --text-dim: #999999;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            background-color: var(--bg-main); color: var(--text-main);
            margin: 0; padding: 20px; min-height: 100vh;
            touch-action: manipulation;
        }

        h1 { 
            font-size: 26px; font-weight: 800; margin-bottom: 20px;
            background: var(--accent-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        /* ⚙️ 설정 섹션 */
        .config-panel {
            background: var(--bg-panel);
            padding: 20px; border-radius: 16px; border: 1px solid #222;
            display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); width: 100%; max-width: 420px;
        }

        .config-row { display: flex; justify-content: space-between; align-items: center; }
        .config-label { font-size: 14px; font-weight: 600; color: var(--text-dim); }
        
        .radio-group { display: flex; gap: 10px; }
        .radio-group label {
            padding: 6px 12px; background: #000; border: 1px solid #333;
            border-radius: 8px; cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        .radio-group input { display: none; }
        .radio-group input:checked + label {
            background: var(--accent-gold); color: #000; border-color: transparent; font-weight: 700;
        }

        #statusBox {
            font-size: 1.1rem; font-weight: 700; margin-bottom: 15px;
            height: 1.5em; color: var(--text-gold); text-align: center;
        }

        /* ♟ 바둑판 디자인 */
        #boardWrapper {
            position: relative; padding: 20px; background-color: var(--board-color); 
            border-radius: 12px; border: 2px solid #222; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        #board {
            position: relative; width: 350px; height: 350px; /* 모바일 대응 가변 가능 */
            background-image: 
                linear-gradient(var(--line-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--line-color) 1px, transparent 1px);
            background-size: calc(100% / 14) calc(100% / 14);
        }

        .point {
            position: absolute; width: 30px; height: 30px;
            transform: translate(-50%, -50%); cursor: pointer; z-index: 10;
        }

        .stone { 
            position: absolute; width: 24px; height: 24px; border-radius: 50%;
            transform: translate(-50%, -50%) scale(0); z-index: 5;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .stone.placed { transform: translate(-50%, -50%) scale(1); }
        .black { background: radial-gradient(circle at 30% 30%, #444, #000); box-shadow: 2px 4px 8px rgba(0,0,0,0.8); }
        .white { background: radial-gradient(circle at 30% 30%, #fff, #bbb); box-shadow: 2px 4px 8px rgba(0,0,0,0.4); }

        .forbid {
            position: absolute; transform: translate(-50%, -50%);
            color: #ff4444; font-weight: 900; font-size: 16px; pointer-events: none; z-index: 6;
        }

        #resetBtn {
            width: 100%; max-width: 460px; margin-top: 25px; padding: 15px;
            background: var(--accent-gold); color: #000; border: none;
            border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 149, 0, 0.3); transition: 0.3s;
        }
        #resetBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 149, 0, 0.5); }

        @media (min-width: 500px) {
            #board { width: 420px; height: 420px; }
            .stone { width: 28px; height: 28px; }
        }
    </style>
</head>
<body>

    <h1>ULTRA RENJU AI</h1>

    <div class="config-panel">
        <div class="config-row">
            <span class="config-label">난이도 설정</span>
            <div class="radio-group">
                <input type="radio" name="difficulty" id="diff-normal" value="N" checked>
                <label for="diff-normal">중수</label>
                <input type="radio" name="difficulty" id="diff-ultra" value="U">
                <label for="diff-ultra">심연 (Ultra)</label>
            </div>
        </div>
        <div class="config-row">
            <span class="config-label">진영 선택</span>
            <div class="radio-group">
                <input type="radio" name="firstPlayer" id="p-black" value="human" checked>
                <label for="p-black">흑 (선공)</label>
                <input type="radio" name="firstPlayer" id="p-white" value="ai">
                <label for="p-white">백 (후공)</label>
            </div>
        </div>
    </div>

    <div id="statusBox">준비 중...</div>

    <div id="boardWrapper">
        <div id="board"></div>
    </div>

    <button id="resetBtn">새 게임 시작</button>

    <script>
        /* ============================================================
           Ultra Renju AI 로직 (사용자 제공 코드 통합)
        ============================================================ */
        const SIZE = 15;
        const EMPTY = 0, BLACK = 1, WHITE = 2;
        let board = [], turn = BLACK, humanColor = BLACK, aiColor = WHITE, gameOver = false;

        function inside(x, y) { return x >= 0 && x < SIZE && y >= 0 && y < SIZE; }
        function setStatus(s) { document.getElementById("statusBox").textContent = s; }
        function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

        function initBoard() { board = Array.from({ length: SIZE }, () => Array(SIZE).fill(EMPTY)); }

        function renderBoard() {
            const wrap = document.getElementById("board");
            wrap.innerHTML = "";
            const gap = wrap.clientWidth / (SIZE - 1);

            for (let y = 0; y < SIZE; y++) {
                for (let x = 0; x < SIZE; x++) {
                    const px = x * gap, py = y * gap;

                    // 클릭 포인트
                    const p = document.createElement("div");
                    p.className = "point";
                    p.style.left = px + "px"; p.style.top = py + "px";
                    p.dataset.x = x; p.dataset.y = y;

                    if ("ontouchstart" in window) p.addEventListener("touchstart", onHumanClick, { passive: true });
                    else p.addEventListener("click", onHumanClick);
                    wrap.appendChild(p);

                    // 돌 렌더링
                    const v = board[y][x];
                    if (v !== EMPTY) {
                        const s = document.createElement("div");
                        s.className = `stone ${v === BLACK ? "black" : "white"} placed`;
                        s.style.left = px + "px"; s.style.top = py + "px";
                        wrap.appendChild(s);
                    }

                    // 금수 렌더링 (플레이어 차례일 때 흑 금수 표시)
                    if (turn === BLACK && v === EMPTY && isForbidden(x, y)) {
                        const f = document.createElement("div");
                        f.className = "forbid";
                        f.textContent = "×";
                        f.style.left = px + "px"; f.style.top = py + "px";
                        wrap.appendChild(f);
                    }
                }
            }
        }

        function onHumanClick(e) {
            if (gameOver || turn !== humanColor) return;
            const x = Number(e.currentTarget.dataset.x), y = Number(e.currentTarget.dataset.y);
            if (!inside(x, y) || board[y][x] !== EMPTY) return;

            if (humanColor === BLACK && isForbidden(x, y)) {
                setStatus("⚠ 금수 자리입니다!"); return;
            }

            board[y][x] = humanColor;
            if (checkWin(humanColor)) {
                gameOver = true; renderBoard(); setStatus("🎉 당신의 승리!"); return;
            }

            turn = aiColor; renderBoard(); setStatus("AI가 생각 중..."); aiStart();
        }

        async function aiStart() {
            if (gameOver) return;
            await wait(300);

            if (board.flat().every(v => v === EMPTY)) {
                board[7][7] = aiColor;
            } else {
                const mv = aiMove();
                if (!mv) { setStatus("무승부"); gameOver = true; return; }
                board[mv.y][mv.x] = aiColor;
            }

            if (checkWin(aiColor)) {
                gameOver = true; renderBoard(); setStatus("💀 AI 승리 (심연에 굴복했습니다)");
            } else {
                turn = humanColor; renderBoard(); setStatus("당신의 차례입니다");
            }
        }

        /* AI 엔진 부분 */
        function aiMove() {
            const diff = document.querySelector("input[name=difficulty]:checked").value;
            const depth = diff === "U" ? 7 : 4;
            const me = aiColor, opp = humanColor;

            let w = findWinning(me); if (w) return w;
            let b = findWinning(opp); if (b) return b;

            let vcf = searchVCF(me, depth); if (vcf) return vcf;
            return searchNormal(me, opp, depth);
        }

        function searchVCF(color, depth) {
            if (depth <= 0) return null;
            const moves = generateMoves(color);
            for (const mv of moves) {
                board[mv.y][mv.x] = color;
                if (checkWin(color)) { board[mv.y][mv.x] = EMPTY; return mv; }
                const block = searchVCF(3 - color, depth - 1);
                board[mv.y][mv.x] = EMPTY;
                if (!block) return mv;
            }
            return null;
        }

        function searchNormal(me, opp, depth) {
            const moves = generateMoves(me);
            let best = null, bestVal = -Infinity;
            for (const mv of moves) {
                board[mv.y][mv.x] = me;
                const val = -minSearch(opp, me, depth - 1, -Infinity, Infinity);
                board[mv.y][mv.x] = EMPTY;
                if (val > bestVal) { bestVal = val; best = mv; }
            }
            return best || moves[0];
        }

        function minSearch(me, opp, depth, alpha, beta) {
            if (depth <= 0) return evalBoard(opp, me);
            const moves = generateMoves(me);
            if (moves.length === 0) return 0;
            for (const mv of moves) {
                board[mv.y][mv.x] = me;
                if (checkWin(me)) { board[mv.y][mv.x] = EMPTY; return -999999; }
                const val = -minSearch(opp, me, depth - 1, -beta, -alpha);
                board[mv.y][mv.x] = EMPTY;
                if (val > alpha) alpha = val;
                if (alpha >= beta) break;
            }
            return alpha;
        }

        function evalBoard(me, opp) {
            let score = 0;
            for(let y=0; y<SIZE; y++) for(let x=0; x<SIZE; x++) {
                if(board[y][x] === me) score += patternScore(x,y,me);
                else if(board[y][x] === opp) score -= patternScore(x,y,opp);
            }
            return score;
        }

        function generateMoves(color) {
            const arr = [];
            for (let y = 0; y < SIZE; y++) {
                for (let x = 0; x < SIZE; x++) {
                    if (board[y][x] !== EMPTY) continue;
                    if (!nearStone(x, y)) continue;
                    if (color === BLACK && isForbidden(x, y)) continue;
                    arr.push({ x, y, score: moveScore(x, y, color) });
                }
            }
            return arr.sort((a, b) => b.score - a.score).slice(0, 16);
        }

        function nearStone(x, y) {
            for (let dy = -2; dy <= 2; dy++) for (let dx = -2; dx <= 2; dx++) {
                const nx = x + dx, ny = y + dy;
                if (inside(nx, ny) && board[ny][nx] !== EMPTY) return true;
            }
            return false;
        }

        function moveScore(x, y, c) { return patternScore(x, y, c) * 2 + patternScore(x, y, 3 - c); }

        function patternScore(x, y, c) {
            const dirs = [[1,0],[0,1],[1,1],[1,-1]];
            let score = 0;
            for (const [dx, dy] of dirs) {
                const len = countLine(x, y, dx, dy, c);
                if (len >= 5) score += 100000;
                else if (len === 4) score += 10000;
                else if (len === 3) score += 1000;
                else if (len === 2) score += 100;
            }
            return score;
        }

        function countLine(x, y, dx, dy, c) {
            let cnt = 1;
            let nx = x + dx, ny = y + dy;
            while (inside(nx, ny) && board[ny][nx] === c) { cnt++; nx += dx; ny += dy; }
            nx = x - dx; ny = y - dy;
            while (inside(nx, ny) && board[ny][nx] === c) { cnt++; nx -= dx; ny -= dy; }
            return cnt;
        }

        function checkWin(c) {
            const dirs = [[1,0],[0,1],[1,1],[1,-1]];
            for(let y=0; y<SIZE; y++) for(let x=0; x<SIZE; x++) {
                if(board[y][x] !== c) continue;
                for(let [dx,dy] of dirs) if(countLine(x,y,dx,dy,c) >= 5) return true;
            }
            return false;
        }

        function isForbidden(x, y) {
            if (board[y][x] !== EMPTY) return false;
            board[y][x] = BLACK;
            const over = countLine(x,y,1,0,BLACK)>=6 || countLine(x,y,0,1,BLACK)>=6 || countLine(x,y,1,1,BLACK)>=6 || countLine(x,y,1,-1,BLACK)>=6;
            const d3 = countOpenPattern(x, y, "01110") >= 2;
            const d4 = countOpenPattern(x, y, "011110") >= 2;
            board[y][x] = EMPTY;
            return over || d3 || d4;
        }

        function countOpenPattern(x, y, pat) {
            const dirs = [[1,0],[0,1],[1,1],[1,-1]];
            let cnt = 0;
            for (const [dx, dy] of dirs) {
                let s = "";
                for (let k = -4; k <= 4; k++) {
                    const nx = x + dx * k, ny = y + dy * k;
                    if (!inside(nx, ny)) s += "3";
                    else if (board[ny][nx] === BLACK) s += "1";
                    else if (board[ny][nx] === WHITE) s += "2";
                    else s += "0";
                }
                if (s.includes(pat)) cnt++;
            }
            return cnt;
        }

        function findWinning(color) {
            for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) {
                if (board[y][x] !== EMPTY) continue;
                if (color === BLACK && isForbidden(x, y)) continue;
                board[y][x] = color;
                const ok = checkWin(color);
                board[y][x] = EMPTY;
                if (ok) return { x, y };
            }
            return null;
        }

        function startGame() {
            gameOver = false;
            const fp = document.querySelector("input[name=firstPlayer]:checked").value;
            humanColor = fp === "human" ? BLACK : WHITE;
            aiColor = humanColor === BLACK ? WHITE : BLACK;
            turn = BLACK;
            initBoard(); renderBoard(); setStatus("게임 시작!");
            if (fp === "ai") aiStart();
        }

        window.onload = () => {
            document.getElementById("resetBtn").onclick = startGame;
            startGame();
        };
    </script>
</body>
</html>
