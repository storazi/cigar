<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>🐂 비흡연자의 쉬는시간</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --sidebar-bg: #111111;
            --card-bg: #161616;
            --accent-gold: linear-gradient(135deg, #ffd447 0%, #ff9500 100%);
            --text-main: #e0e0e0;
            --text-dim: #999999;
            --border-color: #222222;
        }

        * { box-sizing: border-box; }

        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Pretendard', sans-serif; 
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* 🚪 사이드바 (데스크톱) */
        .sidebar { 
            width: 240px; 
            background: var(--sidebar-bg); 
            border-right: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            padding: 30px 15px; 
            flex-shrink: 0; 
            transition: 0.3s;
        }

        .sidebar-title { 
            font-size: 1.1rem; 
            font-weight: 800; 
            text-align: center; 
            margin-bottom: 40px; 
            background: var(--accent-gold); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }

        .sidebar button { 
            background: transparent; 
            border: 1px solid #333; 
            color: var(--text-dim); 
            padding: 14px 18px; 
            text-align: left; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 14px;
            white-space: nowrap;
        }

        .sidebar button:hover { border-color: #ffd447; color: #fff; background: rgba(255, 212, 71, 0.05); }
        .sidebar button.active { 
            background: var(--accent-gold); 
            color: #000; 
            font-weight: 700; 
            border: none; 
            box-shadow: 0 4px 20px rgba(255, 149, 0, 0.25); 
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            text-align: center;
            border-top: 1px solid var(--border-color);
        }

        /* 🖼 콘텐츠 영역 */
        .content { flex: 1; padding: 40px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .tab-content { display: none; height: 100%; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 20px; 
            padding: 30px; 
            margin-bottom: 25px; 
        }

        h2 { margin-top: 0; font-size: 1.4rem; color: #ffd447; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        h2::before { content: ''; width: 4px; height: 20px; background: var(--accent-gold); border-radius: 10px; }

        .frame-wrapper { 
            width: 100%; background: #000; 
            border-radius: 15px; overflow: hidden; 
            border: 1px solid #333; position: relative;
        }
        .full-iframe { width: 100%; border: none; background: #000; display: block; height: 100%; }

        /* 📱 모바일 대응 (화면 너비 768px 이하) */
        @media (max-width: 768px) {
            body { flex-direction: column; }

            .sidebar {
                width: 100%;
                height: auto;
                padding: 15px;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            .sidebar-title { margin-bottom: 15px; font-size: 1rem; }

            .nav-menu {
                flex-direction: row;
                overflow-x: auto; /* 가로 스크롤 가능하게 */
                padding-bottom: 10px;
                gap: 8px;
                -webkit-overflow-scrolling: touch;
            }

            .nav-menu::-webkit-scrollbar { display: none; } /* 스크롤바 숨김 */

            .sidebar button {
                padding: 10px 15px;
                font-size: 13px;
                flex-shrink: 0;
            }

            .sidebar-footer { display: none; } /* 모바일에서 공간 확보를 위해 푸터 숨김 */

            .content { padding: 20px; }
            
            h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-title">쉬는시간</div>
        
        <div class="nav-menu">
            <button id="tabHome" class="active">🏠 홈</button>
            <button id="tabAnsi">🎨 텍스트</button>
            <button id="tabExp">📘 경험치</button>
            <button id="tabCalc">🔥 환각</button>
            <button id="tabOmok">⭕ 오목</button>
        </div>

        <footer class="sidebar-footer">
            <a href="https://hits.sh/storazi.github.io/cigar/">
                <img alt="Hits" src="https://hits.sh/storazi.github.io/cigar.svg?view=today-total&style=flat-square&label=VISITORS&color=ff9500&labelColor=222222"/>
            </a>
            <p style="font-size: 11px; color: var(--text-dim); margin-top:10px; opacity:0.6;">
                © 2026 sup_bot
            </p>
        </footer>
    </nav>

    <main class="content">
        <section id="homeTab" class="tab-content active">
            <div class="card">
                <h2>비흡연자의 쉬는시간</h2>
                <p style="color:var(--text-dim); line-height: 1.6; font-size: 14px;">이 사이트는 시가 부족원을 위해 만들어졌습니다.</p>
            </div>
        </section>

        <section id="ansiTab" class="tab-content">
            <h2>디스코드 텍스트</h2>
            <div class="frame-wrapper">
                <iframe src="./ansi.html" class="full-iframe"></iframe>
            </div>
        </section>

        <section id="expTab" class="tab-content">
            <h2>경험치 계산기</h2>
            <div class="frame-wrapper">
                <iframe src="./exp.html" class="full-iframe"></iframe>
            </div>
        </section>

        <section id="calcTab" class="tab-content">
            <h2>환각 계산기</h2>
            <div class="frame-wrapper">
                <iframe src="./rebirth.html" class="full-iframe"></iframe>
            </div>
        </section>

        <section id="omokTab" class="tab-content">
            <h2>오목 AI</h2>
            <div class="frame-wrapper">
                <iframe src="./omok.html" id="omokFrame" class="full-iframe"></iframe>
            </div>
        </section>
    </main>

    <script>
        const tabs = {
            tabHome: "homeTab",
            tabAnsi: "ansiTab",
            tabExp: "expTab",
            tabCalc: "calcTab",
            tabOmok: "omokTab"
        };

        function adjustFrameHeight() {
            const activeTab = document.querySelector(".tab-content.active");
            const iframe = activeTab.querySelector("iframe");
            if (iframe) {
                const vh = window.innerHeight;
                const rect = iframe.getBoundingClientRect();
                // 화면 하단에서 여유공간 20px 확보
                iframe.style.height = (vh - rect.top - 20) + "px";
            }
        }

        Object.keys(tabs).forEach(key => {
            document.getElementById(key).addEventListener("click", function() {
                document.querySelectorAll(".sidebar button").forEach(b => b.classList.remove("active"));
                document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
                this.classList.add("active");
                document.getElementById(tabs[key]).classList.add("active");
                
                // 탭 전환 후 높이 재조정
                setTimeout(adjustFrameHeight, 100);
            });
        });

        // 윈도우 크기 변경 시 높이 자동 조절
        window.addEventListener("resize", adjustFrameHeight);
        window.onload = () => {
            setTimeout(adjustFrameHeight, 200);
        };
    </script>
</body>
</html>
