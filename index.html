<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>비흡연자의 쉬는시간</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --sidebar-bg: #111111;
            --card-bg: #161616;
            --accent-gold: linear-gradient(135deg, #ffd447 0%, #ff9500 100%);
            --text-main: #e0e0e0;
            --text-dim: #999999;
            --border-color: #222222;
        }

        * { box-sizing: border-box; }

        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Pretendard', sans-serif; 
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* 🚪 사이드바 (PC) */
        .sidebar { 
            width: 240px; 
            background: var(--sidebar-bg); 
            border-right: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            padding: 30px 15px; 
            flex-shrink: 0; 
        }

        .sidebar-title { 
            font-size: 1.1rem; 
            font-weight: 800; 
            text-align: center; 
            margin-bottom: 40px; 
            background: var(--accent-gold); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }

        .sidebar button { 
            background: transparent; 
            border: 1px solid #333; 
            color: var(--text-dim); 
            padding: 14px 18px; 
            text-align: left; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 14px;
            white-space: nowrap;
        }

        .sidebar button:hover { border-color: #ffd447; color: #fff; background: rgba(255, 212, 71, 0.05); }
        .sidebar button.active { 
            background: var(--accent-gold); 
            color: #000; 
            font-weight: 700; 
            border: none; 
            box-shadow: 0 4px 20px rgba(255, 149, 0, 0.25); 
        }

        /* 👣 푸터 (방문자 배지) */
        .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            text-align: center;
            border-top: 1px solid var(--border-color);
        }

        .sidebar-footer p {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 10px;
            opacity: 0.6;
        }

        /* 🖼 콘텐츠 영역 */
        .content { flex: 1; padding: 40px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .tab-content { display: none; height: 100%; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 20px; 
            padding: 30px; 
            margin-bottom: 25px; 
        }

        h2 { margin-top: 0; font-size: 1.6rem; color: #ffd447; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        h2::before { content: ''; width: 4px; height: 24px; background: var(--accent-gold); border-radius: 10px; }

        .frame-wrapper { 
            width: 100%; background: #000; 
            border-radius: 15px; overflow: hidden; 
            border: 1px solid #333; 
        }
        .full-iframe { width: 100%; border: none; background: #000; display: block; }

        /* 📱 모바일 대응 (768px 이하) */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%;
                height: auto;
                padding: 15px;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
            .sidebar-title { margin-bottom: 15px; }
            .nav-menu {
                flex-direction: row;
                overflow-x: auto;
                gap: 8px;
                padding-bottom: 5px;
            }
            .nav-menu::-webkit-scrollbar { display: none; }
            .sidebar button { padding: 10px 15px; font-size: 13px; }
            .sidebar-footer { display: none; }
            .content { padding: 20px; }
            h2 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-title">쉬는시간</div>
        
        <div class="nav-menu">
            <button id="tabHome" class="active">🏠 홈</button>
            <button id="tabAnsi">🎨 텍스트 효과</button>
            <button id="tabExp">📘 경험치 계산기</button>
            <button id="tabCalc">🔥 환각 계산기</button>
            <button id="tabPoison">🧪 맹독 계산기</button>
            <button id="tabCompare">🐾 페트 비교</button>
            <button id="tabOmok">⭕ 오목</button>
        </div>

        <footer class="sidebar-footer">
            <a href="https://hits.sh/storazi.github.io/cigar/">
                <img alt="Hits" src="https://hits.sh/storazi.github.io/cigar.svg?view=today-total&style=flat-square&label=VISITORS&color=ff9500&labelColor=222222"/>
            </a>
            <p>© 2026 sup_bot All rights reserved.</p>
        </footer>
    </nav>

    <main class="content">
        <section id="homeTab" class="tab-content active">
            <div class="card">
                <h2>비흡연자의 쉬는시간</h2>
                <p style="color:var(--text-dim); line-height: 1.6;">이 사이트는 시가 부족원을 위해 만들어졌습니다.</p>
            </div>
        </section>

        <section id="ansiTab" class="tab-content">
            <h2>디스코드 텍스트 생성기</h2>
            <div class="frame-wrapper"><iframe src="./ansi.html" class="full-iframe"></iframe></div>
        </section>

        <section id="expTab" class="tab-content">
            <h2>경험치 계산기</h2>
            <div class="frame-wrapper"><iframe src="./exp.html" class="full-iframe"></iframe></div>
        </section>

        <section id="calcTab" class="tab-content">
            <h2>환각 계산기</h2>
            <div class="frame-wrapper"><iframe src="./rebirth.html" class="full-iframe"></iframe></div>
        </section>

        <section id="poisonTab" class="tab-content">
            <h2>맹독 계산기</h2>
            <div class="frame-wrapper"><iframe src="./poison.html" class="full-iframe"></iframe></div>
        </section>

        <section id="compareTab" class="tab-content">
            <h2>페트 능력치 비교</h2>
            <div class="frame-wrapper"><iframe src="./compare.html" class="full-iframe"></iframe></div>
        </section>

        <section id="omokTab" class="tab-content">
            <h2>오목 AI</h2>
            <div class="frame-wrapper"><iframe src="./omok.html" class="full-iframe"></iframe></div>
        </section>
    </main>

    <script>
        // 도구별 파일 경로 매핑
        const config = {
            tabAnsi: "./ansi.html",
            tabExp: "./exp.html",
            tabCalc: "./rebirth.html",
            tabPoison: "./poison.html",
            tabCompare: "./compare.html",
            tabOmok: "./omok.html"
        };

        // 모바일 여부 판별
        function isMobile() {
            return window.innerWidth <= 768 || /Android|iPhone|iPad/i.test(navigator.userAgent);
        }

        // iframe 높이 조절
        function adjustFrameHeight() {
            const activeTab = document.querySelector(".tab-content.active");
            const iframe = activeTab?.querySelector("iframe");
            if (iframe) {
                const vh = window.innerHeight;
                const rect = iframe.getBoundingClientRect();
                // 화면 하단 여백을 위해 20px 정도 제외
                iframe.style.height = (vh - rect.top - 20) + "px";
            }
        }

        // 버튼 클릭 이벤트
        document.querySelectorAll(".sidebar button").forEach(btn => {
            btn.addEventListener("click", function() {
                const id = this.id;

                if (id === 'tabHome') {
                    switchTab(id, 'homeTab');
                    return;
                }

                // 모바일 환경에서는 새 탭으로 열기
                if (isMobile()) {
                    window.open(config[id], '_blank');
                } 
                else {
                    // ID 규칙에 맞춰 섹션 ID 생성 (예: tabCompare -> compareTab)
                    const targetSectionId = id.replace('tab', '').charAt(0).toLowerCase() + id.replace('tab', '').slice(1) + 'Tab';
                    switchTab(id, targetSectionId);
                }
            });
        });

        // 탭 전환 로직
        function switchTab(btnId, sectionId) {
            // 모든 버튼과 섹션 비활성화
            document.querySelectorAll(".sidebar button").forEach(b => b.classList.remove("active"));
            document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
            
            // 선택한 탭 활성화
            const activeBtn = document.getElementById(btnId);
            const activeSection = document.getElementById(sectionId);
            
            if (activeBtn) activeBtn.classList.add("active");
            if (activeSection) activeSection.classList.add("active");
            
            // iframe 높이 재계산
            if (!isMobile()) setTimeout(adjustFrameHeight, 50);
        }

        window.addEventListener("resize", () => {
            if (!isMobile()) adjustFrameHeight();
        });

        window.onload = () => {
            if (!isMobile()) setTimeout(adjustFrameHeight, 100);
        };
    </script>
</body>
</html>
